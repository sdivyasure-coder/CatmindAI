<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Debug Lab - Smart AI Learning</title>
    <style>
        :root{
            --bg:#060d1c;
            --panel:#0f1b36;
            --line:rgba(255,255,255,0.12);
            --text:#e9f2ff;
            --muted:#9cb0d7;
            --neon:#5df1ff;
            --green:#56f3a7;
            --red:#ff6b6b;
            --purple:#a56dff;
        }
        *{margin:0;padding:0;box-sizing:border-box}
        body{
            font-family:"Segoe UI",Tahoma,Geneva,Verdana,sans-serif;
            min-height:100vh;
            color:var(--text);
            padding:20px;
            background:
                radial-gradient(1000px 600px at 0% -20%, #1d3366 0%, transparent 60%),
                radial-gradient(900px 520px at 100% 5%, #3e1f65 0%, transparent 62%),
                linear-gradient(180deg, #050913 0%, #060d1c 100%);
        }
        .bg-grid{position:fixed;inset:0;pointer-events:none;background-image:linear-gradient(rgba(255,255,255,.03) 1px,transparent 1px),linear-gradient(90deg,rgba(255,255,255,.03) 1px,transparent 1px);background-size:28px 28px;mask-image:radial-gradient(circle at center, black 30%, transparent 80%);opacity:.6}
        nav{max-width:1200px;margin:0 auto 20px auto;border:1px solid var(--line);border-radius:16px;padding:14px 18px;display:flex;justify-content:space-between;align-items:center;backdrop-filter:blur(10px);background:linear-gradient(180deg,rgba(255,255,255,.08),rgba(255,255,255,.03));position:relative;z-index:1}
        nav h1{font-size:28px;color:var(--text);text-shadow:0 0 14px rgba(93,241,255,.35)}
        nav a{color:var(--neon);margin:0 10px;text-decoration:none;cursor:pointer;font-weight:600}
        .container{max-width:1200px;margin:0 auto;position:relative;z-index:1}
        .user-badge{
            max-width:1200px;
            margin:0 auto 12px auto;
            padding:10px 12px;
            border-radius:10px;
            border:1px solid var(--line);
            background:rgba(255,255,255,.04);
            color:var(--muted);
            font-size:14px;
            position:relative;
            z-index:1;
        }
        .lab-container{
            display:grid;
            grid-template-columns: 280px 1fr;
            gap:16px;
        }
        .course-panel{
            border:1px solid var(--line);
            border-radius:16px;
            padding:16px;
            background:linear-gradient(180deg, rgba(17,31,61,.92), rgba(11,20,40,.96));
            box-shadow:0 16px 36px rgba(0,0,0,.35);
        }
        .course-panel h2{font-size:18px;margin-bottom:10px}
        .course-list, .task-list{display:flex;flex-direction:column;gap:8px}
        .course-btn, .task-btn{
            padding:10px 12px;
            border-radius:12px;
            border:1px solid var(--line);
            background:rgba(255,255,255,.03);
            color:var(--text);
            cursor:pointer;
            font-weight:700;
            text-align:left;
        }
        .course-btn.active, .task-btn.active{
            border-color:#4ea7ff;
            background:rgba(58,123,255,.3);
            box-shadow:0 0 0 1px rgba(58,123,255,.4) inset;
        }
        .task-section-title{margin:14px 0 8px 0;color:var(--muted);font-size:12px;letter-spacing:.6px;text-transform:uppercase}

        .debug-panel{
            border:1px solid var(--line);
            border-radius:16px;
            padding:20px;
            background:linear-gradient(180deg, rgba(17,31,61,.92), rgba(11,20,40,.96));
            box-shadow:0 16px 36px rgba(0,0,0,.35);
        }
        .panel-head{display:flex;justify-content:space-between;align-items:flex-start;gap:12px;margin-bottom:14px}
        .panel-head h2{font-size:26px;line-height:1.2;margin-bottom:6px}
        .panel-head p{color:var(--muted);font-size:14px}
        .chip{display:inline-block;padding:4px 10px;border-radius:999px;border:1px solid var(--line);color:var(--neon);font-size:12px;margin-bottom:8px}
        .status-pill{padding:6px 10px;border-radius:999px;border:1px solid var(--line);font-size:12px;font-weight:700}
        .status-pill.good{border-color:var(--green);color:var(--green)}
        .status-pill.bad{border-color:var(--red);color:var(--red)}
        .status-pill.neutral{border-color:var(--line);color:var(--muted)}

        .editor-wrap{margin-top:12px}
        .editor-wrap label{display:block;color:var(--muted);font-size:12px;margin-bottom:6px}
        textarea{
            width:100%;
            min-height:260px;
            resize:vertical;
            border-radius:14px;
            border:1px solid var(--line);
            background:rgba(6,12,26,.8);
            color:var(--text);
            padding:14px;
            font-family:"Courier New",monospace;
            font-size:14px;
            line-height:1.5;
            outline:none;
        }
        textarea:focus{border-color:rgba(93,241,255,.5);box-shadow:0 0 0 2px rgba(93,241,255,.15)}

        .actions{display:flex;gap:10px;margin-top:12px}
        button{
            flex:1;
            padding:12px;
            border:none;
            border-radius:12px;
            cursor:pointer;
            font-weight:800;
            font-size:16px;
            letter-spacing:.2px;
            background:linear-gradient(135deg,#3a7bff 0%, #8a4dff 100%);
            color:#fff;
            transition:transform .18s ease, box-shadow .18s ease;
            box-shadow:0 10px 20px rgba(58,123,255,.3)
        }
        button:hover{transform:translateY(-2px);box-shadow:0 14px 26px rgba(58,123,255,.42)}
        button.secondary{background:linear-gradient(135deg,#22304d 0%, #2a3b60 100%);box-shadow:0 10px 20px rgba(20,26,46,.35)}

        .feedback{margin-top:16px;border:1px dashed var(--line);border-radius:12px;padding:14px;background:rgba(255,255,255,.03)}
        .feedback h3{margin-bottom:8px;font-size:16px}
        .feedback h4{margin:10px 0 6px 0;font-size:14px;color:var(--text)}
        .feedback ul{padding-left:18px;color:var(--muted);line-height:1.6}
        .feedback li.good{color:var(--green)}
        .feedback li.bad{color:var(--red)}
        .code-fix{
            margin-top:10px;
            padding:10px;
            border-radius:10px;
            border:1px solid var(--line);
            background:rgba(6,12,26,.7);
            font-family:"Courier New",monospace;
            font-size:13px;
            white-space:pre-wrap;
            color:var(--text);
        }
        .hidden{display:none}

        @media (max-width:960px){
            body{padding:12px}
            nav{padding:12px;flex-direction:column;align-items:flex-start;gap:8px}
            nav h1{font-size:24px}
            .lab-container{grid-template-columns:1fr}
            .panel-head{flex-direction:column}
        }
    </style>
</head>
<body>
    <div class="bg-grid"></div>
    <nav>
        <h1>Smart AI Learning</h1>
        <div>
            <a onclick="window.location.href='courses.html'">Courses</a>
            <a onclick="logout()">Logout</a>
        </div>
    </nav>
    <div class="user-badge" id="activeUserBadge">Logged in as: --</div>

    <div class="container">
        <div class="lab-container">

                    <div class="status-pill neutral" id="statusPill">Not submitted</div>
                </div>

                <div class="editor-wrap">
                    <label for="codeEditor">Buggy Code (fix it)</label>
                    <textarea id="codeEditor" spellcheck="false"></textarea>
                </div>

                <div class="actions">
                    <button class="secondary" id="resetBtn" type="button">Reset Buggy Code</button>
                    <button id="submitFixBtn" type="button">Submit Fix</button>
                </div>

                <div class="feedback">
                    <h3>AI Feedback</h3>
                    <h4>Summary</h4>
                    <ul id="feedbackList">
                        <li>Choose a course and challenge to start debugging.</li>
                    </ul>
                    <div id="mistakesBlock" class="hidden">
                        <h4>Mistakes</h4>
                        <ul id="mistakesList"></ul>
                    </div>
                    <div id="tipsBlock" class="hidden">
                        <h4>Tips</h4>
                        <ul id="tipsList"></ul>
                    </div>
                    <div id="fixBlock" class="hidden">
                        <h4>Corrected Code</h4>
                        <div class="code-fix" id="correctedCode"></div>
                    </div>
                </div>
            </section>
        </div>
    </div>

        const MIN_SNIPPET_LINES = 10;
        const MAX_SNIPPET_LINES = 25;

        function countLines(code) {
            return String(code || '').split('\n').length;
        }

        function commentPrefixFor(course) {
            if (course === 'Python') return '# ';
            if (course === 'SQL') return '-- ';
            return '// ';
        }

        function addPreamble(code, lines, commentPrefix) {
            if (!code || !Array.isArray(lines) || !lines.length) return code;
            const prefix = commentPrefix || '';
            const preamble = lines.map((line) => `${prefix}${line}`).join('\n');
            return `${preamble}\n${code}`;
        }

        function insertAfterFirstLine(code, insertLines) {
            if (!code || !Array.isArray(insertLines) || !insertLines.length) return code;
            const newlineIndex = code.indexOf('\n');
            if (newlineIndex === -1) {
                const insertion = insertLines.map((line) => `    ${line}`).join('\n');
                return `${code}\n${insertion}`;
            }
            const rest = code.slice(newlineIndex + 1);
            let indent = '    ';
            const indentMatch = rest.match(/^[ \t]*/);
            if (indentMatch && indentMatch[0].length) indent = indentMatch[0];
            const insertion = insertLines.map((line) => `${indent}${line}`).join('\n');
            return `${code.slice(0, newlineIndex + 1)}${insertion}\n${rest}`;
        }

        function insertAfterFirstBlockLine(code, insertLines) {
            if (!code || !Array.isArray(insertLines) || !insertLines.length) return code;
            const braceIndex = code.indexOf('{');
            if (braceIndex === -1) return code;
            const newlineIndex = code.indexOf('\n', braceIndex);
            const rest = newlineIndex === -1
                ? code.slice(braceIndex + 1)
                : code.slice(newlineIndex + 1);
            let indent = '    ';
            if (newlineIndex !== -1) {
                const indentMatch = rest.match(/^[ \t]*/);
                if (indentMatch && indentMatch[0].length) indent = indentMatch[0];
            }
            const insertion = insertLines.map((line) => `${indent}${line}`).join('\n');
            const head = newlineIndex === -1
                ? `${code.slice(0, braceIndex + 1)}\n`
                : code.slice(0, newlineIndex + 1);
            return `${head}${insertion}\n${rest}`;
        }

        function insertBodyLines(course, code, lines) {
            if (!lines.length) return code;
            let updated = code;
            if (course === 'Python') {
                updated = insertAfterFirstLine(code, lines);
            } else {
                updated = insertAfterFirstBlockLine(code, lines);
            }
            if (updated === code) {
                return `${code}\n${lines.join('\n')}`;
            }
            return updated;
        }

        function expandSnippet(course, code) {
            if (!code) return code;
            const base = String(code);
            const baseLines = countLines(base);
            if (baseLines >= MIN_SNIPPET_LINES && baseLines <= MAX_SNIPPET_LINES) {
                return base;
            }
            if (baseLines > MAX_SNIPPET_LINES) {
                return base;
            }

            const commentPrefix = commentPrefixFor(course);
            const preambleLines = [
                'Debug context',
                'Trace the logic step by step'
            ];

            let bodyLines = [];
            if (course === 'Python') {
                bodyLines = [
                    'trace_flag = True',
                    'step_index = 0',
                    '# debug note 1',
                    '# debug note 2'
                ];
            } else if (course === 'JavaScript') {
                bodyLines = [
                    'const traceFlag = true;',
                    'let stepIndex = 0;',
                    '// debug note 1',
                    '// debug note 2'
                ];
            } else if (course === 'TypeScript') {
                bodyLines = [
                    'const traceFlag: boolean = true;',
                    'let stepIndex: number = 0;',
                    '// debug note 1',
                    '// debug note 2'
                ];
            } else if (course === 'Java') {
                bodyLines = [
                    'boolean traceFlag = true;',
                    'int stepIndex = 0;',
                    '// debug note 1',
                    '// debug note 2'
                ];
            } else if (course === 'C++') {
                bodyLines = [
                    'bool traceFlag = true;',
                    'int stepIndex = 0;',
                    '// debug note 1',
                    '// debug note 2'
                ];
            }

            let projected = baseLines + preambleLines.length + bodyLines.length;
            if (projected < MIN_SNIPPET_LINES) {
                const needed = MIN_SNIPPET_LINES - projected;
                if (course === 'SQL') {
                    for (let i = 1; i <= needed; i += 1) {
                        preambleLines.push(`debug note ${i}`);
                    }
                } else {
                    for (let i = 1; i <= needed; i += 1) {
                        bodyLines.push(`${commentPrefix}debug note ${i + 2}`);
                    }
                }
            }

            let updated = addPreamble(base, preambleLines, commentPrefix);
            if (course === 'SQL') {
                return updated;
            }
            if (bodyLines.length) {
                updated = insertBodyLines(course, updated, bodyLines);
            }
            return updated;
        }

        Object.keys(debugCourses).forEach((course) => {
            const courseData = debugCourses[course];
            if (!courseData || !Array.isArray(courseData.tasks)) return;
            courseData.tasks = courseData.tasks.map((task) => ({
                ...task,
                buggy: expandSnippet(course, task.buggy),
                solution: expandSnippet(course, task.solution)
            }));
        });

        const courseList = document.getElementById('courseList');
        const taskList = document.getElementById('taskList');
        const activeCourseEl = document.getElementById('activeCourse');
        const taskTitleEl = document.getElementById('taskTitle');
        const taskDescEl = document.getElementById('taskDesc');
        const codeEditor = document.getElementById('codeEditor');
        const feedbackList = document.getElementById('feedbackList');
        const mistakesBlock = document.getElementById('mistakesBlock');
        const mistakesList = document.getElementById('mistakesList');
        const tipsBlock = document.getElementById('tipsBlock');
        const tipsList = document.getElementById('tipsList');
        const fixBlock = document.getElementById('fixBlock');
        const correctedCode = document.getElementById('correctedCode');
        const statusPill = document.getElementById('statusPill');
        const resetBtn = document.getElementById('resetBtn');
        const submitFixBtn = document.getElementById('submitFixBtn');

        let activeCourse = null;
        let activeTaskIndex = 0;
        let buggySnapshot = '';
        const DRAFT_PREFIX = 'debugDraft';

        function normalize(code) {
            return String(code || '')
                .replace(/\r\n/g, '\n')
                .replace(/[ \t]+$/gm, '')
                .trim();
        }

        function setStatus(state, text) {
            statusPill.classList.remove('good', 'bad', 'neutral');
            statusPill.classList.add(state);
            statusPill.textContent = text;
        }

        function draftKey(course, index) {
            return `${DRAFT_PREFIX}:${course}:${index}`;
        }

        function loadDraft(course, index) {
            return localStorage.getItem(draftKey(course, index)) || '';
        }

        function saveDraft(course, index, code) {
            localStorage.setItem(draftKey(course, index), code);
        }

        function renderCourses() {
            courseList.innerHTML = '';
            Object.keys(debugCourses).forEach((course) => {
                const btn = document.createElement('button');
                btn.className = 'course-btn';
                btn.textContent = course;
                btn.onclick = () => selectCourse(course);
                if (course === activeCourse) btn.classList.add('active');
                courseList.appendChild(btn);
            });
        }

        function renderTasks() {
            taskList.innerHTML = '';
            const tasks = debugCourses[activeCourse].tasks;
            tasks.forEach((task, index) => {
                const btn = document.createElement('button');
                btn.className = 'task-btn';
                btn.textContent = `${index + 1}. ${task.title}`;
                btn.onclick = () => selectTask(index);
                if (index === activeTaskIndex) btn.classList.add('active');
                taskList.appendChild(btn);
            });
        }

        function selectCourse(course) {
            activeCourse = course;
            activeTaskIndex = 0;
            renderCourses();
            renderTasks();
            loadTask();
        }

        function selectTask(index) {
            activeTaskIndex = index;
            renderTasks();
            loadTask();
        }

        function loadTask() {
            const task = debugCourses[activeCourse].tasks[activeTaskIndex];
            activeCourseEl.textContent = activeCourse;
            taskTitleEl.textContent = task.title;
            taskDescEl.textContent = task.description;
            buggySnapshot = task.buggy;
            const draft = loadDraft(activeCourse, activeTaskIndex);
            codeEditor.value = draft || task.buggy;
            feedbackList.innerHTML = draft
                ? '<li>Loaded your saved draft. Continue debugging.</li>'
                : '<li>Fix the code and submit to get feedback.</li>';
            mistakesBlock.classList.add('hidden');
            tipsBlock.classList.add('hidden');
            fixBlock.classList.add('hidden');
            setStatus('neutral', 'Not submitted');
        }

        function evaluateSubmission(task, code) {
            const normalized = normalize(code);
            const expected = normalize(task.solution);
            if (normalized === expected) {
                return { correct: true, messages: ['Looks perfect! Great debugging.'] };
            }

            const issues = [];
            if (task.rules && task.rules.mustInclude) {
                task.rules.mustInclude.forEach((rule) => {
                    if (!rule.regex.test(code)) {
                        issues.push(rule.message);
                    }
                });
            }
            if (task.rules && task.rules.mustNotInclude) {
                task.rules.mustNotInclude.forEach((rule) => {
                    if (rule.regex.test(code)) {
                        issues.push(rule.message);
                    }
                });
            }
            if (!issues.length) {
                issues.push('Your fix is close. Double-check the logic and syntax.');
            }
            return { correct: false, messages: issues };
        }

        function renderFeedback(result) {
            feedbackList.innerHTML = '';
            result.messages.forEach((msg) => {
                const li = document.createElement('li');
                li.textContent = msg;
                li.className = result.correct ? 'good' : 'bad';
                feedbackList.appendChild(li);
            });

            mistakesList.innerHTML = '';
            if (Array.isArray(result.mistakes) && result.mistakes.length) {
                result.mistakes.forEach((msg) => {
                    const li = document.createElement('li');
                    li.textContent = msg;
                    li.className = 'bad';
                    mistakesList.appendChild(li);
                });
                mistakesBlock.classList.remove('hidden');
            } else {
                mistakesBlock.classList.add('hidden');
            }

            tipsList.innerHTML = '';
            if (Array.isArray(result.tips) && result.tips.length) {
                result.tips.forEach((msg) => {
                    const li = document.createElement('li');
                    li.textContent = msg;
                    tipsList.appendChild(li);
                });
                tipsBlock.classList.remove('hidden');
            } else {
                tipsBlock.classList.add('hidden');
            }

            if (result.corrected_code) {
                correctedCode.textContent = result.corrected_code;
                fixBlock.classList.remove('hidden');
            } else {
                fixBlock.classList.add('hidden');
            }
        }

        async function submitFix() {
            if (!activeCourse) return;
            const task = debugCourses[activeCourse].tasks[activeTaskIndex];
            const code = codeEditor.value;
            setStatus('neutral', 'Reviewing...');
            submitFixBtn.disabled = true;

            let result = null;
            try {
                const response = await fetch(EVAL_ENDPOINT, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({
                        user_email: activeEmail || 'guest',
                        course: activeCourse,
                        task_title: task.title,
                        description: task.description,
                        buggy_code: task.buggy,
                        expected_solution: task.solution,
                        submitted_code: code
                    })
                });
                const data = await response.json().catch(() => ({}));
                if (response.ok && typeof data.correct === 'boolean') {
                    result = {
                        correct: data.correct,
                        messages: Array.isArray(data.messages) && data.messages.length
                            ? data.messages
                            : ['AI review complete.'],
                        mistakes: Array.isArray(data.mistakes) ? data.mistakes : [],
                        tips: Array.isArray(data.tips) ? data.tips : [],
                        corrected_code: data.corrected_code || ''
                    };
                }
            } catch (error) {
                result = null;
            }

            if (!result) {
                result = evaluateSubmission(task, code);
                result.mistakes = result.correct ? [] : result.messages.slice(0);
                result.tips = [];
                result.corrected_code = result.correct ? '' : (task.solution || '');
                result.messages.unshift('AI offline, using local checks.');
            }

            renderFeedback(result);
            setStatus(result.correct ? 'good' : 'bad', result.correct ? 'Correct' : 'Needs fixes');
            submitFixBtn.disabled = false;
        }

        resetBtn.addEventListener('click', () => {
            codeEditor.value = buggySnapshot;
            saveDraft(activeCourse, activeTaskIndex, codeEditor.value);
            feedbackList.innerHTML = '<li>Buggy code restored. Try again.</li>';
            mistakesBlock.classList.add('hidden');
            tipsBlock.classList.add('hidden');
            fixBlock.classList.add('hidden');
            setStatus('neutral', 'Not submitted');
        });

        codeEditor.addEventListener('input', () => {
            if (!activeCourse) return;
            saveDraft(activeCourse, activeTaskIndex, codeEditor.value);
        });

        submitFixBtn.addEventListener('click', submitFix);

        function logout() {
            localStorage.removeItem('token');
            localStorage.removeItem('email');
            window.location.href = 'index.html';
        }

        (function init() {
            const preferred = localStorage.getItem('selectedCourse');
            activeCourse = debugCourses[preferred] ? preferred : Object.keys(debugCourses)[0];
            renderCourses();
            renderTasks();
            loadTask();
        })();
    </script>
</body>
</html>
