<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Learn - Smart AI Learning</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        
        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
            padding: 20px;
        }
        
        nav {
            background: white;
            padding: 15px 30px;
            border-radius: 10px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 30px;
            box-shadow: 0 4px 6px rgba(0, 0, 0, 0.1);
        }
        
        nav h1 {
            color: #667eea;
        }
        
        nav a {
            color: #667eea;
            margin: 0 15px;
            text-decoration: none;
            cursor: pointer;
        }
        
        .container {
            max-width: 1000px;
            margin: 0 auto;
        }
        
        .content {
            display: grid;
            grid-template-columns: 250px 1fr;
            gap: 20px;
        }
        
        .sidebar {
            background: white;
            padding: 20px;
            border-radius: 10px;
            box-shadow: 0 4px 6px rgba(0, 0, 0, 0.1);
            height: fit-content;
        }
        
        .sidebar h3 {
            color: #667eea;
            margin-bottom: 15px;
            font-size: 16px;
        }
        
        .topic-item {
            padding: 10px;
            margin-bottom: 8px;
            background: #f5f5f5;
            border-radius: 5px;
            cursor: pointer;
            transition: background 0.2s;
        }
        
        .topic-item:hover {
            background: #e8e8e8;
        }
        
        .topic-item.active {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
        }
        
        .main {
            background: white;
            padding: 30px;
            border-radius: 10px;
            box-shadow: 0 4px 6px rgba(0, 0, 0, 0.1);
        }
        
        .main h2 {
            color: #333;
            margin-bottom: 15px;
        }
        
        .main p {
            color: #666;
            line-height: 1.8;
            margin-bottom: 20px;
        }
        
        .code-block {
            background: #2d2d2d;
            color: #f8f8f2;
            padding: 15px;
            border-radius: 5px;
            overflow-x: auto;
            margin-bottom: 20px;
            font-family: 'Courier New', monospace;
            font-size: 14px;
        }
        
        .ai-hint {
            background: #e3f2fd;
            padding: 15px;
            border-left: 4px solid #667eea;
            border-radius: 5px;
            margin-bottom: 20px;
        }
        
        .ai-hint strong {
            color: #667eea;
        }
        
        .btn {
            padding: 12px 20px;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
            border: none;
            border-radius: 5px;
            cursor: pointer;
            font-weight: 600;
            margin-right: 10px;
        }
        
        .btn:hover {
            transform: translateY(-2px);
        }
        
        @media (max-width: 768px) {
            .content {
                grid-template-columns: 1fr;
            }
        }
    </style>
</head>
<body>
    <nav>
        <h1>🎓 Smart AI Learning</h1>
        <div>
            <a onclick="window.location.href='courses.html'">Back to Courses</a>
            <a onclick="logout()">Logout</a>
        </div>
    </nav>

    <div class="container">

            </div>

                <h2 id="topicTitle">Welcome</h2>
                <div id="content"></div>
                <div style="margin-top: 30px;">
                    <button class="btn" onclick="prevTopic()">← Previous</button>
                    <button class="btn" onclick="nextTopic()">Next →</button>
                    <button class="btn" onclick="window.location.href='tests.html'" style="background: #27ae60;">Take Quiz 🎯</button>
                </div>
            </div>
        </div>
    </div>

        const courseTopics = topics[course] || topics['Python'];
        
        // Load the last topic the user was on, or start from 0
        let currentTopic = parseInt(localStorage.getItem(`lastTopic_${course}`) || '0');

        function loadTopics() {
            document.getElementById('courseTitle').textContent = course;
            const topicsList = document.getElementById('topicsList');
            topicsList.innerHTML = '';
            
            courseTopics.forEach((topic, index) => {
                const item = document.createElement('div');
                item.className = 'topic-item' + (index === currentTopic ? ' active' : '');
                item.textContent = topic.name;
                item.onclick = () => selectTopic(index);
                topicsList.appendChild(item);
            });
            
            displayTopic(currentTopic);
        }

        function selectTopic(index) {
            currentTopic = index;
            // Save the current topic to localStorage so it persists
            localStorage.setItem(`lastTopic_${course}`, currentTopic);
            document.querySelectorAll('.topic-item').forEach((item, i) => {
                item.classList.toggle('active', i === index);
            });
            displayTopic(index);
        }

        function displayTopic(index) {
            const topic = courseTopics[index];
            document.getElementById('topicTitle').textContent = topic.name;
            document.getElementById('content').innerHTML = `
                <p>${topic.content}</p>
                <div class="ai-hint">
                    <strong>💡 AI Tip:</strong> Try to understand the core concepts first, then practice with real-world examples.
                </div>
                <div class="code-block">
# Example code for ${topic.name}
print("Learning ${topic.name} in ${course}")
                </div>
            `;
        }

        function nextTopic() {
            if (currentTopic < courseTopics.length - 1) {
                selectTopic(currentTopic + 1);
            } else {
                alert('You have completed all topics! Ready for the quiz?');
            }
        }

        function prevTopic() {
            if (currentTopic > 0) {
                selectTopic(currentTopic - 1);
            }
        }

        function logout() {
            localStorage.removeItem('token');
            localStorage.removeItem('email');
            window.location.href = 'index.html';
        }

        loadTopics();
    </script>
</body>
</html>
